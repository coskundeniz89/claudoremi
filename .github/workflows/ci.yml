name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Node unit tests (cookie conversion)
        run: node --test tests/cookies.test.mjs
      - name: PowerShell IPC tests (emulated pipe server)
        run: pwsh -File tests/mpv-ipc.test.ps1
      - name: Spotify smoke tests
        run: pwsh -File tests/spotify.test.ps1
